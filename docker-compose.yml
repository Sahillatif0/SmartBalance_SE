version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./smartbalance.db
      - HEALTH_CHECK_INTERVAL=5
    volumes:
      - ./backend:/app
    networks:
      - smartbalance

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - smartbalance

networks:
  smartbalance:
    driver: bridge
